<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления проектами</title>
    <style>
        body { font-family: sans-serif; margin: 40px; background: #f4f4f9; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #007bff; color: white; }
        .status-active { color: green; font-weight: bold; }
        .status-stop { color: red; font-weight: bold; }
        button { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>Мои финансовые проекты</h1>
    <button onclick="loadProjects()">Обновить список</button>
    <br><br>

    <table id="projectsTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Менеджер</th>
                <th>Выручка</th>
                <th>Статус</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script>
        async function loadProjects() {
            try {
                const response = await fetch('http://127.0.0.1:8000/data');
                const data = await response.json();

                const tableBody = document.querySelector('#projectsTable tbody');
                tableBody.innerHTML = '';

                if (data.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">База пуста. Добавьте проекты через Swagger!</td></tr>';
                    return;
                }

                data.forEach(project => {
                    const row = `
                        <tr>
                            <td>${project.id}</td>
                            <td>${project.manager_name}</td>
                            <td>${project.revenue} руб.</td>
                            <td class="status-${project.status}">${project.status}</td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Ошибка:', error);
                alert('Не удалось загрузить данные. Проверь консоль!');
            }
        }

        loadProjects();
    </script>
</body>
</html>
